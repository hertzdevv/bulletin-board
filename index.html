<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Hertz - Status</title>
    <style>
        /* 极致简约的纯文本风格 */
        body {
            font-family: "SF Mono", "Menlo", "Monaco", "Consolas", monospace;
            background-color: #ffffff;
            color: #000000;
            padding: 40px 20px;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.8;
            font-size: 15px;
        }
        
        /* 基础的黑白反色交互 */
        a { color: #000000; text-decoration: underline; }
        a:hover { background-color: #000000; color: #ffffff; text-decoration: none; }
        
        .header { margin-bottom: 40px; }
        
        /* 用虚线作为简单的视觉分隔 */
        .site-row { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 1px dashed #cccccc; 
            padding: 8px 0; 
            margin-bottom: 12px; 
        }
        
        .footer { 
            margin-top: 40px; 
            font-size: 13px; 
            color: #666666; 
        }
    </style>
</head>
<body>
    <div class="header">
        <strong>X HERTZ SYSTEM STATUS</strong><br>
        Explore the unknown frequency.
        <br><br>
        ----------------------------------------
    </div>

    <div id="status-list">
        </div>

    <div class="footer">
        ----------------------------------------<br>
        Last check: <span id="time-display"></span>
    </div>

    <script>
        // 站点配置
        const sites = [
            { name: 'X Hertz 主站', url: 'hub.xhz.app' },
            { name: '备用站点', url: '887290.xyz' }
        ];

        function renderStatus() {
            const container = document.getElementById('status-list');
            container.innerHTML = '';
            
            sites.forEach(site => {
                const row = document.createElement('div');
                row.className = 'site-row';
                
                // 使用纯文本符号 [ OK ] 表达状态
                row.innerHTML = `
                    <span><a href="https://${site.url}" target="_blank">${site.url}</a></span> 
                    <span>[ OK ]</span>
                `;
                container.appendChild(row);
            });

            // 更新时间
            const now = new Date();
            document.getElementById('time-display').innerText = now.toLocaleString('zh-CN', { hour12: false });
        }

        // 初始运行并设置定时刷新
        renderStatus();
        setInterval(renderStatus, 60000);
    </script>
</body>
</html>
